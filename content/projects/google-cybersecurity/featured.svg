<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="#ffffff"/>

  <!-- Subtle bottom-color bar -->
  <rect x="0" y="360" width="150" height="40" rx="0" fill="#4285F4"/>
  <rect x="150" y="360" width="150" height="40" fill="#EA4335"/>
  <rect x="300" y="360" width="150" height="40" fill="#FBBC05"/>
  <rect x="450" y="360" width="150" height="40" rx="0" fill="#34A853"/>

  <!-- Google wordmark — each letter in brand color -->
  <text
    x="300" y="230"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="128"
    font-weight="700"
    letter-spacing="-4"
  >
    <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
  </text>

  <!-- Subtitle -->
  <text
    x="300" y="298"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#5f6368"
    letter-spacing="3"
  >CYBERSECURITY</text>
</svg>
